<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>京东代付</title>
<meta property="og:title" content="京东代付">
<meta property="og:description" content="Hi~帮我付一下这个订单吧~">
<meta property="og:image" content="https://13.nx1g.com/static/image/jingdong.png">
<meta property="og:image:width" content="300">
<meta property="og:image:height" content="300">
<meta property="og:url" content="https://yangjia8linshi.github.io/nexus-share/jd.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="京东代付">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,sans-serif;background:#f5f5f5;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.card{background:#fff;border-radius:16px;padding:30px;text-align:center;max-width:340px;width:85%;box-shadow:0 4px 20px rgba(0,0,0,0.06);}
.icon{width:72px;height:72px;margin:0 auto 16px;}
.icon img{width:100%;height:100%;object-fit:contain;}
h1{font-size:18px;color:#333;margin-bottom:8px;}
p{font-size:14px;color:#999;line-height:1.6;margin-bottom:20px;}
.loading{display:inline-block;width:24px;height:24px;border:3px solid #eee;border-top-color:#07c160;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="card">
<div class="icon"><img src="https://13.nx1g.com/static/image/jingdong.png" alt="京东代付"></div>
<h1>京东代付</h1>
<p>Hi~帮我付一下这个订单吧~</p>
<div class="loading"></div>
<p style="font-size:12px;color:#bbb;margin-top:16px;">正在跳转支付页面...</p>
</div>
<script>
(function(){
var p=new URLSearchParams(window.location.search);
var u=p.get('url');
var n=p.get('_s')||'';
if(u){
try{
var t=decodeURIComponent(u);
if(n&&t.indexOf('_s')===-1){t+=(t.indexOf('?')===-1?'?':'&')+'_s='+n;}
setTimeout(function(){window.location.replace(t);},500);
}catch(e){window.location.replace(decodeURIComponent(u));}
}else{document.querySelector('.loading').style.display='none';document.querySelector('p:last-child').textContent='链接无效';}
})();
</script>
</body>
</html>
